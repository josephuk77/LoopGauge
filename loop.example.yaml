version: 1
project:
  name: your-project
  root: .
  commands:
    setup: npm ci
    build: npm run build
    test: npm test
    lint: npm run lint
    typecheck: npm run typecheck
  commandTimeoutMs: 300000
task:
  name: your-repeated-task
  samples:
    - id: representative-1
      prompt: Replace this with a representative task.
      requirementScore: 1
    - id: representative-2
      prompt: Replace this with a second representative task.
      requirementScore: 1
    - id: edge-case-1
      prompt: Replace this with an important edge case.
      requirementScore: 1
      # Optional reference produced by an existing workflow:
      # baselinePatchPath: fixtures/edge-case-1.patch
providers:
  # This is the only model the user chooses. It becomes the teacher baseline.
  modelDiscovery:
    current:
      provider: openai
      model: gpt-5.6
    # LoopGauge loads cheaper coding-capable models only from the same provider.
    maxCandidates: 4
    refreshFromProvider: true
quality:
  minimumBaselineRatio: 0.95
  weights:
    functional: 60
    requirements: 20
    regression: 10
    staticAnalysis: 10
  similarityWeights:
    behavior: 70
    structure: 20
    text: 10
optimization:
  budgetUsd: 30
  perRunBudgetUsd: 3
  baselineRepetitions: 3
  maxIterations: 30
  noImprovementLimit: 4
  reasoningEfforts:
    - low
    - medium
  promptVariants:
    - plain
    - verify
    - budget-aware
  allowedTools:
    - Read
    - Edit
    - Write
    - Bash
    - Glob
    - Grep
  networkAccess: false
