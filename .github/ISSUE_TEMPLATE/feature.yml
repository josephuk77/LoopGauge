name: Feature request
description: Suggest a focused improvement tied to an observable user outcome.
title: "[feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or unnecessarily expensive today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired observable outcome
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Provider, privacy, and budget boundaries
